theme:
  - color:
      primary: "#63A361"
    generateShades: true
  - color:
      base: "#292725"
    userShades:
      100:
        l: "+ 0.02"
      200:
        l: "+ 0.05"
      300:
        l: "+ 0.1"
  - color:
      base-content: "#292725"

shades:
  - "100"
  - "200"
  - "300"
  - "400"

spacing:
  - 1: "0.25rem"
  - 2: "0.5rem"
  - 3: "1.0rem"
  - 4: "1.5rem"
  - 5: "2.0rem"
  - 6: "2.5rem"

padding:
  - 0: "0"
  - 1: "0.25rem"
  - 2: "0.5rem"
  - 3: "1.0rem"
  - 4: "1.5rem"

margin:
  - 0: "0"
  - 1: "0.25rem"
  - 2: "0.5rem"
  - 3: "1.0rem"
  - 4: "1.5rem"

border:
  - 0: "none"
  - 1: "1px"
  - 2: "2px"
  - 3: "3px"
  - 4: "4px"
